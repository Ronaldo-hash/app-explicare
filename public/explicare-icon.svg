<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#c9a857"/>
      <stop offset="100%" style="stop-color:#b8942e"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a5a8f"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M50 5 L92 22 L92 58 C92 80 72 96 50 105 C28 96 8 80 8 58 L8 22 Z" 
        fill="url(#navy)" stroke="url(#gold)" stroke-width="2.5"/>
  
  <!-- Balance scale inside shield -->
  <g transform="translate(50, 52)" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Center pillar -->
    <line x1="0" y1="-25" x2="0" y2="20"/>
    <!-- Base -->
    <line x1="-14" y1="20" x2="14" y2="20"/>
    <!-- Top beam -->
    <line x1="-25" y1="-20" x2="25" y2="-20"/>
    <!-- Top circle -->
    <circle cx="0" cy="-25" r="4" fill="url(#gold)"/>
    <!-- Left chain -->
    <line x1="-25" y1="-20" x2="-25" y2="-6"/>
    <!-- Right chain -->
    <line x1="25" y1="-20" x2="25" y2="-6"/>
    <!-- Left plate -->
    <path d="M-33 -6 Q-25 4 -17 -6" stroke-width="2.5"/>
    <!-- Right plate -->
    <path d="M17 -6 Q25 4 33 -6" stroke-width="2.5"/>
  </g>
</svg>
